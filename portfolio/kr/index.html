<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="문제를 구조로 바꿔 팀이 실행할 수 있게 만드는 서비스 기획자 포트폴리오">
  <title>Siyoung Jang - Portfolio</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Siyoung Jang - Portfolio">
  <meta property="og:description" content="문제를 구조로 바꿔 팀이 실행할 수 있게 만드는 서비스 기획자 포트폴리오">
  <meta property="og:image" content="../assets/images/og-portfolio.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Siyoung Jang - Portfolio">
  <meta name="twitter:description" content="문제를 구조로 바꿔 팀이 실행할 수 있게 만드는 서비스 기획자 포트폴리오">
  <meta name="twitter:image" content="../assets/images/og-portfolio.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <script type="module" src="../js/app.js"></script>
</head>
<body>
  <a class="skip-nav" href="#home" data-i18n="ui.skipNav">본문으로 이동</a>

  <section class="cover" id="cover">
    <div class="cover__inner reveal">
      <p class="cover__label" data-i18n="cover.label">포트폴리오</p>
      <h1 class="cover__name" data-i18n="hero.name">Siyoung Jang</h1>
      <p class="cover__role" data-i18n="hero.role">서비스 기획자</p>
    </div>
    <a class="cover__scroll" href="#home" aria-label="아래로 이동" data-i18n-attr="aria-label:cover.scroll">
      <span class="cover__scroll-mouse" aria-hidden="true"></span>
      <span class="cover__scroll-label" data-i18n="cover.scroll">아래로 이동</span>
    </a>
  </section>

  <header class="topbar" id="topbar">
    <div class="topbar__brand">
      <span class="topbar__eyebrow" data-i18n="cover.label">포트폴리오</span>
      <div class="topbar__identity">
        <span class="topbar__name" data-i18n="hero.name">Siyoung Jang</span>
        <span class="topbar__divider">|</span>
        <span class="topbar__role" data-i18n="hero.role">서비스 기획자</span>
      </div>
    </div>
    <nav class="topbar__nav" aria-label="주요 섹션" data-i18n-attr="aria-label:ui.navLabel">
      <a href="#home" class="sidebar__link active" data-i18n="nav.home">Home</a>
      <a href="#skills" class="sidebar__link" data-i18n="nav.skills">Skills</a>
      <a href="#projects" class="sidebar__link" data-i18n="nav.projects">Projects</a>
      <a href="#contact" class="sidebar__link" data-i18n="nav.contact">Contact</a>
    </nav>
    <button class="lang-toggle lang-toggle--topbar" id="lang-toggle" aria-label="언어 전환" data-i18n-attr="aria-label:ui.langToggle">
      <span class="lang-toggle__option active" data-lang="ko">KO</span>
      <span class="lang-toggle__divider">|</span>
      <span class="lang-toggle__option" data-lang="en">EN</span>
    </button>
  </header>

  <header class="mobile-header" id="mobile-header">
    <div class="mobile-header__brand">
      <span class="mobile-header__eyebrow" data-i18n="cover.label">포트폴리오</span>
      <span class="sidebar__logo">Siyoung</span>
    </div>
    <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false" data-i18n-attr="aria-label:ui.menuOpen">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="mobile-nav" id="mobile-nav" aria-label="주요 섹션" data-i18n-attr="aria-label:ui.navLabel">
    <a href="#home" class="sidebar__link active" data-i18n="nav.home">Home</a>
    <a href="#skills" class="sidebar__link" data-i18n="nav.skills">Skills</a>
    <a href="#projects" class="sidebar__link" data-i18n="nav.projects">Projects</a>
    <a href="#contact" class="sidebar__link" data-i18n="nav.contact">Contact</a>
    <button class="lang-toggle lang-toggle--mobile" id="mobile-lang-toggle" aria-label="언어 전환" data-i18n-attr="aria-label:ui.langToggle">
      <span class="lang-toggle__option active" data-lang="ko">KO</span>
      <span class="lang-toggle__divider">|</span>
      <span class="lang-toggle__option" data-lang="en">EN</span>
    </button>
  </nav>

  <main class="main-content">
    <section class="section section--home" id="home">
      <div class="profile-hero">
        <div class="profile-hero__body">
          <div class="profile-hero__intro">
            <h2 class="profile-hero__section-title" data-i18n="about.title">About Me</h2>
          </div>
          <p class="profile-hero__headline" data-i18n="hero.headline">문제를 구조로 바꿔 팀이 실행할 수 있게 만드는 기획자</p>
          <div class="profile-hero__photo profile-hero__photo--mobile">
            <div class="profile-hero__img-wrap">
              <img class="profile-hero__img" src="../assets/images/photo.jpg" alt="장시영 프로필 사진" loading="eager" decoding="async">
            </div>
          </div>
          <div class="profile-hero__about">
            <div class="profile-hero__summary" id="home-summary"></div>
          </div>
          <div class="profile-hero__icons">
            <a href="mailto:jsyoung456@gmail.com" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/bryant-jang-b8208b255/" target="_blank" rel="noopener" aria-label="LinkedIn" class="profile-hero__icon profile-hero__icon--linkedin">
              <img src="../assets/images/linkedin.png" alt="" class="social-icon" aria-hidden="true">
            </a>
            <a href="https://velog.io/@bryant_/posts" target="_blank" rel="noopener" aria-label="Velog" class="profile-hero__icon profile-hero__icon--velog">
              <img src="../assets/images/velog_logo.png" alt="" class="social-icon velog-icon" aria-hidden="true">
            </a>
          </div>
        </div>
        <div class="profile-hero__photo profile-hero__photo--desktop">
          <div class="profile-hero__img-wrap">
            <img class="profile-hero__img" src="../assets/images/photo.jpg" alt="장시영 프로필 사진" loading="eager" decoding="async">
          </div>
        </div>
        <div class="profile-hero__work-preview">
          <p class="profile-hero__work-title" data-i18n="about.strengths">Key Strengths</p>
          <div class="profile-hero__work-badges" id="home-work-badges"></div>
        </div>
      </div>
    </section>

    <section class="section section--alt" id="skills">
      <div class="section-header reveal">
        <h2 class="section-header__title" data-i18n="section.skills">Skills</h2>
        <span class="section-header__line"></span>
      </div>
      <div class="skills-layout reveal">
        <div class="skills-main">
          <div class="skill-groups reveal-stagger" id="skill-grid"></div>
        </div>
      </div>
    </section>

    <section class="section" id="projects">
      <div class="section-header reveal">
        <h2 class="section-header__title" data-i18n="section.projects">Projects</h2>
        <span class="section-header__line"></span>
      </div>
      <div class="project-grid reveal-stagger" id="project-list"></div>
    </section>

    <section class="section section--alt section--contact" id="contact">
      <div class="section-header reveal">
        <h2 class="section-header__title" data-i18n="section.contact">Contact</h2>
        <span class="section-header__line"></span>
      </div>
      <div class="contact-cards reveal-stagger" id="contact-links"></div>
    </section>
    <footer class="page-footer">
      <p class="page-footer__copy">&copy; Siyoung Jang</p>
    </footer>
  </main>

  <a class="contact-fab" href="#contact" data-i18n="hero.cta_contact">Contact Me</a>
</body>
</html>
